services:
  - type: web
    name: docai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set this in Render dashboard
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: CORS_ORIGINS
        value: "*"
