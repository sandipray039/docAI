services:
  ollama:
    image: ollama/ollama:latest
    container_name: docai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        OLLAMA_HOST=http://ollama:11434 ollama pull ${LLM_MODEL:-llama3.2:3b} &&
        OLLAMA_HOST=http://ollama:11434 ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}
      "
    restart: "no"

  backend:
    build: ./backend
    container_name: docai-backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - backend_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: docai-frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  backend_data:
