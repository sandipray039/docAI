services:
  - type: web
    name: docai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set this in Render dashboard
      - key: CORS_ORIGINS
        value: "*"
    disk:
      name: docai-data
      mountPath: /app/data
      sizeGB: 1
